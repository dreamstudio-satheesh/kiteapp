version: "3.8"

services:
  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web
    deploy:
      placement:
        constraints: [node.hostname == web-node]

  frontend:
    build: ./react
    networks:
      - web
    deploy:
      placement:
        constraints: [node.hostname == web-node]

  backend:
    build: ./backend
    env_file: .env
    networks:
      - web
    ports:
      - "8000:8000"
    deploy:
      placement:
        constraints: [node.hostname == app-node]

  ticker:
    build: ./ticker
    env_file: .env
    networks:
      - web
    deploy:
      placement:
        constraints: [node.hostname == app-node]

  sync_positions:
    build: ./sync_positions
    env_file: .env
    networks:
      - web
    deploy:
      placement:
        constraints: [node.hostname == app-node]

  monitor_orders:
    build: ./monitor_orders
    env_file: .env
    networks:
      - web
    deploy:
      placement:
        constraints: [node.hostname == app-node]

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: kiteadmin
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - web
    deploy:
      placement:
        constraints: [node.hostname == db-node]

  redis:
    image: redis:7-alpine
    networks:
      - web
    deploy:
      placement:
        constraints: [node.hostname == db-node]

  phpmyadmin:
    image: phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: password
    ports:
      - "8080:80"
    networks:
      - web
    deploy:
      placement:
        constraints: [node.hostname == db-node]

volumes:
  mysql-data:
  caddy_data:
  caddy_config:

networks:
  web:
    driver: overlay
